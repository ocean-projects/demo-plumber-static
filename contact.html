<!DOCTYPE html>
<html lang="en">
<head>

  <title>Contact</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<section class="section">
  <div class="container contact-layout">

    <div>
      <h1>Need Service? Contact Us Anytime</h1>

      <p class="muted">
        We're available 24/7 across the GTA and surrounding areas for plumbing,
        heating, and emergency service calls.
      </p>

      <p class="strong">
        Have a question or need a quote? We're here to help.
      </p>

      <p><strong>Phone:</strong> (647) 869-9256</p>
      <p><strong>Email:</strong> info@dmplumbingdrainservice.ca</p>
      <p><strong>Address:</strong> 4548 Dufferin St, North York</p>
    </div>

    <form class="form">
      <input placeholder="Name">
      <input placeholder="Phone">
      <input placeholder="Email">
      <textarea placeholder="Message"></textarea>
      <button class="btn primary">Send Request</button>
    </form>

  </div>
</section>

<section class="map">
  <iframe src="https://www.google.com/maps?q=4548+Dufferin+St,+North+York,+ON&output=embed"></iframe>
